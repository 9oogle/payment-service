spring:
  application:
    name: payment-service
  config:
    import: optional:file:${user.home}/.spring/payment/application-local.yml
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect